name: MLflow CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    name: Run MLflow Project & Build Docker
    runs-on: ubuntu-latest

    env:
      # Anda perlu menambahkan secrets ini di GitHub -> Settings -> Secrets and variables -> Actions
      DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}
      DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USER }}/${{ secrets.DAGSHUB_REPO }}.mlflow
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USER }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      DOCKER_USER: ${{ secrets.DOCKER_USER }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      IMAGE_NAME: ${{ secrets.DOCKER_USER }}/telco-churn-model

    steps:
      # ── 1. Checkout repositori ───────────────────────────────────────────────
      - name: ☁️ Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ──────────────────────────────────────────────────────
      - name: 🐍 Set Up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # ── 3. Install dependensi ────────────────────────────────────────────────
      - name: 📦 Install Dependencies
        working-directory: ./MLProject
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mlflow dagshub

      # ── 4. Menjalankan Training & Tuning via mlflow run ────────────────────
      - name: 🚀 Run MLflow Project (mlflow run)
        working-directory: ./MLProject
        run: |
          # Wajib menggunakan mlflow run agar seluruh proses eksperimen,
          # dependensi, dan environment tercatat sesuai standar MLflow Project.
          # --env-manager=local agar tidak membutuhkan conda di CI/CD runner.
          mlflow run . --env-manager=local

      # ── 5. Ambil Run ID dari file run_id.txt ────────────────────────────────
      - name: 🔍 Get Best Run ID
        id: get_run_id
        working-directory: ./MLProject
        run: |
          if [ ! -f run_id.txt ]; then
            echo "ERROR: run_id.txt not found! modelling_tuning.py may have failed."
            exit 1
          fi
          RUN_ID=$(cat run_id.txt | tr -d '[:space:]')
          if [ -z "$RUN_ID" ]; then
            echo "ERROR: run_id.txt is empty!"
            exit 1
          fi
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Best Run ID is: $RUN_ID"

      # ── 6. Upload Artefak (Plots & Reports) ──────────────────────────────────
      - name: 📤 Upload Artifacts (Plots & Reports)
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ env.RUN_ID }}
          path: MLProject/artifacts/
          retention-days: 14

      # ── 7. Login ke Docker Hub ───────────────────────────────────────────────
      - name: 🐳 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── 8. Verifikasi Model & Build Docker Image ───────────────────────────
      - name: 🏗️ Build Docker Image (Custom Dockerfile)
        working-directory: ./MLProject
        run: |
          # Verifikasi model tersedia
          if [ ! -f "model/MLmodel" ]; then
            echo "ERROR: ./model/MLmodel not found! Training may have failed."
            ls -la model/ || echo "model/ directory does not exist"
            exit 1
          fi
          echo "Model found at ./model/"

          # Generate Dockerfile secara dinamis via printf (menghindari leading
          # whitespace dari heredoc YAML). Menggunakan python:3.10-slim agar
          # tidak ada PPA deadsnakes timeout seperti pada mlflow build-docker.
          printf '%s\n' \
            'FROM python:3.10-slim' \
            'WORKDIR /app' \
            'RUN apt-get update && apt-get install -y --no-install-recommends gcc g++ && rm -rf /var/lib/apt/lists/*' \
            'COPY model/ /app/model/' \
            'RUN pip install --no-cache-dir mlflow>=2.4.0 scikit-learn>=1.2.0 pandas>=1.5.0 numpy>=1.23.0 uvicorn>=0.20.0' \
            'EXPOSE 8080' \
            'CMD ["mlflow","models","serve","-m","/app/model","--host","0.0.0.0","--port","8080","--no-conda"]' \
            > Dockerfile

          echo "=== Dockerfile yang akan digunakan ==="
          cat Dockerfile
          echo "======================================"
          echo "Building Docker image..."
          docker build -t ${{ env.IMAGE_NAME }}:latest .

      # ── 9. Push Docker Image ke Docker Hub ───────────────────────────────────
      - name: 🚀 Push Docker Image to Docker Hub
        run: |
          docker push ${{ env.IMAGE_NAME }}:latest
          echo "Image pushed successfully: ${{ env.IMAGE_NAME }}:latest"
